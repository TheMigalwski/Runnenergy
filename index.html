<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RUNNENERGY — Login</title>

  <!-- CSS externo -->
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>
  <main class="page">
    <section class="hero" aria-label="Imagem de capa"></section>

    <section class="panel" aria-label="Área de login">
      <div class="card">
        <header class="brand">
          <!-- Troque pelo seu logo -->
          <img
            src="./assets/img/logoRunnenergy.png"
            alt="RUNNENERGY"
          />
        </header>

        <form autocomplete="on">
          <div class="field">
            <p class="label">Email</p>
            <input
              class="input"
              type="email"
              name="email"
              placeholder="corredor@runnenergy.com"
            />
          </div>

          <div class="field">
            <p class="label">Senha</p>
            <input
              class="input"
              type="password"
              name="password"
              placeholder="Sua senha"
            />
          </div>

          <button class="login-btn" type="submit">Login</button>

          <div class="divider">Logar com</div>

          <div class="oauth" role="group" aria-label="Login social">
            <button
              class="oauth-btn apple"
              type="button"
              aria-label="Entrar com Apple"
            >
              <!-- Apple SVG -->
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M16.75 2.2c-.83.06-1.8.55-2.37 1.23-.53.62-1 1.55-.84 2.45.9.07 1.84-.46 2.4-1.14.56-.67.98-1.58.81-2.54Z" fill="#fff"/>
                <path d="M20.08 17.03c-.45 1.04-.66 1.5-1.24 2.42-.82 1.28-1.97 2.88-3.39 2.9-1.26.02-1.58-.82-3.3-.81-1.72.01-2.08.83-3.35.8-1.42-.02-2.5-1.47-3.32-2.75-2.3-3.58-2.54-7.78-1.12-10.01 1.01-1.6 2.62-2.54 4.12-2.54 1.53 0 2.5.84 3.77.84 1.23 0 1.98-.85 3.76-.85 1.33 0 2.74.73 3.75 1.99-3.3 1.81-2.77 6.55.32 8.01Z" fill="#fff"/>
              </svg>
            </button>

            <button
              class="oauth-btn google"
              type="button"
              aria-label="Entrar com Google"
            >
              <!-- Google SVG -->
              <svg viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.659 32.655 29.225 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.957 3.043l5.657-5.657C34.051 6.053 29.241 4 24 4 12.954 4 4 12.954 4 24s8.954 20 20 20 20-8.954 20-20c0-1.341-.138-2.65-.389-3.917Z"/>
                <path fill="#FF3D00" d="M6.306 14.691 12.88 19.51C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.957 3.043l5.657-5.657C34.051 6.053 29.241 4 24 4c-7.682 0-14.35 4.327-17.694 10.691Z"/>
                <path fill="#4CAF50" d="M24 44c5.122 0 9.834-1.966 13.358-5.164l-6.173-5.223C29.146 35.091 26.742 36 24 36c-5.204 0-9.624-3.317-11.283-7.946l-6.52 5.02C9.49 39.556 16.227 44 24 44Z"/>
                <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.06 12.06 0 0 1-4.118 5.613h.002l6.173 5.223C36.934 39.243 44 34 44 24c0-1.341-.138-2.65-.389-3.917Z"/>
              </svg>
            </button>
          </div>

          <div class="footer">
            <span>Não tem conta?</span>
            <a href="#">Criar Conta</a>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
